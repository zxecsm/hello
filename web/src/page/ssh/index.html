<!doctype html>
<html>
  <head></head>
  <body style="opacity: 0">
    <div id="app">
      <div class="ssh_box">
        <div id="terminal"></div>
        <pre class="log_text"></pre>
        <div class="t_menu">
          <div class="inp_box">
            <input autocomplete="off" type="text" placeholder="输入命令" />
            <i cursor="y" class="clear iconfont icon-shibai"></i>
            <i cursor="y" class="send_btn iconfont icon-huaban"></i>
          </div>
          <button cursor="y" class="btn btn_info iconfont icon-history history_btn"></button>
          <button cursor="y" class="btn btn_info iconfont icon-fuzhi log_btn"></button>
          <button cursor="y" class="btn btn_info iconfont icon-IDP-wenjianchuanshu file_transfer_btn"></button>
          <button cursor="y" class="btn btn_info iconfont icon-kuandukuoda full_width"></button>
          <button cursor="y" class="btn btn_info iconfont icon-xiala full_height"></button>
        </div>
      </div>
      <div class="footer">
        <div class="resize ns-resize"></div>
        <div class="shortcuts no_select">
          <button cursor="y" class="btn btn_info esc">ESC</button>
          <button cursor="y" class="btn btn_info tab">TAB</button>
          <button cursor="y" class="btn btn_info ctrl">CTRL</button>
          <button cursor="y" class="btn btn_info alt">ALT</button>
          <button cursor="y" class="btn btn_info iconfont icon-shang up"></button>
          <button cursor="y" class="btn btn_info iconfont icon-xiala down"></button>
          <button cursor="y" class="btn btn_info iconfont icon-zuo left"></button>
          <button cursor="y" class="btn btn_info iconfont icon-you right"></button>
        </div>
        <div class="quick_group"></div>
        <div class="quick_commands"></div>
      </div>
    </div>
  </body>
</html>
